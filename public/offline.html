<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unfat Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .box {
      max-width: 360px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: #1a1a1a;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.25rem; }
    p { margin: 0; color: #9a9a9a; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>Reconnect to continue using Unfat.</p>
  </div>
</body>
</html>
